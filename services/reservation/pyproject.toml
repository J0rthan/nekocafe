[tool.black]
line-length = 120
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --cov=src --cov-report=term-missing"

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]

[tool.mutmut]
paths_to_mutate = ["src/domain.py"]
runner = "python -m pytest tests/"
backup = false
