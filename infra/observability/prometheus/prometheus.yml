global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: "nekocafe-reservation"
    metrics_path: /metrics
    static_configs:
      - targets: ["reservation:8000"]
        labels:
          service: reservation
          environment: ${ENVIRONMENT}

  - job_name: "nekocafe-member"
    metrics_path: /metrics
    static_configs:
      - targets: ["member:8001"]
        labels:
          service: member
          environment: ${ENVIRONMENT}

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
