apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-reservation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.reservation.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.image.tag }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nekocafe
    app.kubernetes.io/managed-by: helm
spec:
  {{- if not .Values.canary.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- else }}
  replicas: {{ max 1 (div (mul .Values.replicaCount (.Values.canary.weight | int)) 100) }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.reservation.name }}
      version: {{ .Values.image.tag | quote }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.reservation.port }}"
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app: {{ .Values.reservation.name }}
        version: {{ .Values.image.tag | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
      - name: reservation
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOrg }}/reservation:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.reservation.port }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: redis-url
        {{- range $key, $val := .Values.reservation.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.healthCheck.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.healthCheck.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.reservation.name }}
              topologyKey: kubernetes.io/hostname
