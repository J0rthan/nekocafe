name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      strategy:
        description: 'Deployment strategy'
        required: true
        type: choice
        options: [canary, blue-green]
        default: 'canary'
      canary_percent:
        description: 'Canary percentage (5-50)'
        type: number
        default: 5

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: "${{ github.repository_owner }}/nekocafe"

jobs:
  # ============================================================
  # Deploy to Dev (自动)
  # ============================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config
          kubectl config current-context || echo "No kubeconfig found, continuing..."

      - name: Helm lint
        run: helm lint infra/helm/nekocafe/

      - name: Deploy to Dev
        run: |
          helm upgrade --install nekocafe infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --set global.imageOrg=${{ github.repository_owner }}/nekocafe \
            --namespace nekocafe-dev \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Health check
        run: |
          kubectl rollout status deployment/reservation -n nekocafe-dev --timeout=3m
          kubectl rollout status deployment/member -n nekocafe-dev --timeout=3m

  # ============================================================
  # Deploy to Staging (Canary)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging (Canary)
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'prod'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl & Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy Canary 5%
        run: |
          helm upgrade --install nekocafe-canary infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set global.imageOrg=${{ github.repository_owner }}/nekocafe \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --namespace nekocafe-staging \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Monitor canary health (5 min)
        run: |
          echo "Monitoring canary for 5 minutes..."
          for i in $(seq 1 10); do
            sleep 30
            ERROR_RATE=$(curl -s http://prometheus-staging:9090/api/v1/query?query=rate(http_requests_total{status=~'5..'}[1m]) | jq '.data.result[0].value[1]' || echo "0")
            P95_LATENCY=$(curl -s http://prometheus-staging:9090/api/v1/query?query=histogram_quantile(0.95,rate(http_request_duration_seconds_bucket[1m])) | jq '.data.result[0].value[1]' || echo "0")
            echo "Error Rate: $ERROR_RATE | P95 Latency: ${P95_LATENCY}s"
            if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
              echo "::error::Error rate exceeded 1% threshold! Rolling back..."
              bash scripts/rollback.sh staging
              exit 1
            fi
            if (( $(echo "$P95_LATENCY > 0.5" | bc -l) )); then
              echo "::error::P95 latency exceeded 500ms threshold! Rolling back..."
              bash scripts/rollback.sh staging
              exit 1
            fi
          done
          echo "Canary healthy. Promoting to 100%..."

      - name: Promote Canary to 100%
        run: bash scripts/canary-promote.sh staging 100

  # ============================================================
  # Deploy to Production (Canary + 审批)
  # ============================================================
  deploy-prod:
    name: Deploy to Production (Canary)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://api.nekocafe.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl & Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy Canary 5%
        run: |
          helm upgrade --install nekocafe-canary infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set global.imageOrg=${{ github.repository_owner }}/nekocafe \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --namespace nekocafe-prod \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Monitor canary health (10 min)
        run: |
          echo "Monitoring production canary for 10 minutes..."
          for i in $(seq 1 20); do
            sleep 30
            ERROR_RATE=$(curl -s http://prometheus-prod:9090/api/v1/query?query=rate(http_requests_total{status=~'5..'}[1m]) | jq '.data.result[0].value[1]' || echo "0")
            if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
              echo "::error::PROD error rate exceeded 1%! Auto-rollback initiated!"
              bash scripts/rollback.sh prod
              exit 1
            fi
          done

      - name: Promote Canary
        run: bash scripts/canary-promote.sh prod 100

  # ============================================================
  # Auto Rollback (故障自动回滚)
  # ============================================================
  auto-rollback:
    name: Auto Rollback
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          kubectl config current-context || echo "No kubeconfig found, continuing..."

      - name: Trigger Rollback
        run: |
          echo "Pipeline failure detected. Triggering automatic rollback..."
          bash scripts/rollback.sh prod

      - name: Notify
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Auto-Rollback Triggered — Prod Deployment Failed',
              body: `Production deployment of commit \`${context.sha}\` failed and was automatically rolled back.\n\nCheck [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
            });
