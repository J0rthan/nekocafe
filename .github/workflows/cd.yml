name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      strategy:
        description: 'Deployment strategy'
        required: true
        type: choice
        options: [canary, blue-green]
        default: 'canary'
      canary_percent:
        description: 'Canary percentage (5-50)'
        type: number
        default: 5
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: "${{ github.repository_owner }}/nekocafe"
  IMAGE_TAG: "${{ github.event.inputs.image_tag || 'latest' }}"

jobs:
  # ============================================================
  # Deploy to Dev
  # ============================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        run: |
          curl -sLo kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x kind
          ./kind create cluster --name nekocafe-dev --wait 2m
          mkdir -p ~/.kube
          ./kind get kubeconfig --name nekocafe-dev > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Set lowercase image org
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ORG=${OWNER}/nekocafe" >> $GITHUB_ENV

      - name: Helm lint
        run: helm lint infra/helm/nekocafe/

      - name: Deploy to Dev
        run: |
          helm upgrade --install nekocafe infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-dev.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set global.imageOrg=${{ env.IMAGE_ORG }} \
            --set autoscaling.enabled=false \
            --set serviceMonitor.enabled=false \
            --set ingress.enabled=false \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --namespace nekocafe-dev \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Health check
        run: |
          kubectl rollout status deployment/nekocafe-reservation -n nekocafe-dev --timeout=3m
          kubectl rollout status deployment/nekocafe-member -n nekocafe-dev --timeout=3m
          kubectl get pods -n nekocafe-dev

      - name: Cleanup kind cluster
        if: always()
        run: ./kind delete cluster --name nekocafe-dev || true

  # ============================================================
  # Deploy to Staging (Canary)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging (Canary)
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        run: |
          curl -sLo kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x kind
          ./kind create cluster --name nekocafe-staging --wait 2m
          mkdir -p ~/.kube
          ./kind get kubeconfig --name nekocafe-staging > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Set lowercase image org
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ORG=${OWNER}/nekocafe" >> $GITHUB_ENV

      - name: Deploy Canary 5%
        run: |
          helm upgrade --install nekocafe-canary infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-staging.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set global.imageOrg=${{ env.IMAGE_ORG }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --set autoscaling.enabled=false \
            --set serviceMonitor.enabled=false \
            --set ingress.enabled=false \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --namespace nekocafe-staging \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Monitor canary pods (2 min)
        run: |
          echo "Monitoring canary pods..."
          for i in $(seq 1 4); do
            echo "=== Check $i/4 ==="
            kubectl get pods -n nekocafe-staging
            kubectl rollout status deployment/nekocafe-canary-reservation -n nekocafe-staging --timeout=30s || true
            sleep 30
          done
          echo "Canary healthy. Promoting to 100%..."

      - name: Promote Canary to 100%
        run: bash scripts/canary-promote.sh staging 100

      - name: Cleanup kind cluster
        if: always()
        run: ./kind delete cluster --name nekocafe-staging || true

  # ============================================================
  # Deploy to Production (Canary)
  # ============================================================
  deploy-prod:
    name: Deploy to Production (Canary)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://api.nekocafe.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        run: |
          curl -sLo kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x kind
          ./kind create cluster --name nekocafe-prod --wait 2m
          mkdir -p ~/.kube
          ./kind get kubeconfig --name nekocafe-prod > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Set lowercase image org
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ORG=${OWNER}/nekocafe" >> $GITHUB_ENV

      - name: Deploy Canary 5%
        run: |
          helm upgrade --install nekocafe-canary infra/helm/nekocafe/ \
            -f infra/helm/nekocafe/values-prod.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set global.imageOrg=${{ env.IMAGE_ORG }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --set autoscaling.enabled=false \
            --set serviceMonitor.enabled=false \
            --set ingress.enabled=false \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --namespace nekocafe-prod \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Monitor canary pods (4 min)
        run: |
          echo "Monitoring production canary pods..."
          for i in $(seq 1 8); do
            echo "=== Check $i/8 ==="
            kubectl get pods -n nekocafe-prod
            kubectl rollout status deployment/nekocafe-canary-reservation -n nekocafe-prod --timeout=30s || true
            sleep 30
          done

      - name: Promote Canary
        run: bash scripts/canary-promote.sh prod 100

      - name: Cleanup kind cluster
        if: always()
        run: ./kind delete cluster --name nekocafe-prod || true

  # ============================================================
  # Auto Rollback
  # ============================================================
  auto-rollback:
    name: Auto Rollback
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Notify
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Auto-Rollback Triggered — Prod Deployment Failed',
              body: `Production deployment of commit \`${context.sha}\` failed.\n\nCheck [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`
            });
